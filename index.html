<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f1117">
<title>Shiftr: Work Shift Tracker</title>
<link rel="icon" type="image/x-icon" href="./ico/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="./ico/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="./ico/favicon-32x32.png">
<link rel="apple-touch-icon" href="./ico/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css?v=1.2.3">
<link rel="manifest" href="./manifest.json?v=1.0.2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shiftr">
</head>
<body>

<div id="offline-banner" class="offline-banner" aria-live="polite" aria-atomic="true" hidden>
  <span class="offline-banner__icon">📶</span>
  <span class="offline-banner__text" id="offline-banner-text"></span>
</div>

<div class="app" id="app"></div>

<script>
(function () {
  'use strict';

  var banner = document.getElementById('offline-banner');

  function showOfflineBanner() {
    if (banner) banner.removeAttribute('hidden');
    document.documentElement.setAttribute('data-offline', '');
  }
  function hideOfflineBanner() {
    if (banner) banner.setAttribute('hidden', '');
    document.documentElement.removeAttribute('data-offline');
  }

  // Initialise banner state based on current connectivity
  if (!navigator.onLine) showOfflineBanner();

  window.addEventListener('online',  hideOfflineBanner);
  window.addEventListener('offline', showOfflineBanner);

  if (!('serviceWorker' in navigator)) return; // unsupported browser

  window.addEventListener('load', function () {
    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then(function (reg) {
        console.log('[SW] Registered, scope:', reg.scope);

        reg.addEventListener('updatefound', function () {
          var newWorker = reg.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', function () {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[SW] New version available. Reload to update.');
            }
          });
        });
      })
      .catch(function (err) {
        console.warn('[SW] Registration failed:', err);
      });

    // When a new SW takes over, reload the page so all assets are fresh.
    var refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (!refreshing) { refreshing = true; window.location.reload(); }
    });
  });
}());
</script>

<script type="module" src="./app.js?v=1.3.0"></script>
</body>
</html>
