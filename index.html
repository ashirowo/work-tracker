<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Hour Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root[data-theme="dark"]{
  --bg-page:#0f1117;--bg-card:#1a1d27;--bg-card2:#21253a;--bg-hover:#252a3a;
  --border:#2e3348;--border-strong:#3d4460;--text:#e8eaf0;--text-muted:#7a80a0;
  --text-hint:#4e5470;--primary:#5b7fff;--primary-bg:#1a2040;
  --success:#3ecf6e;--success-bg:#0e2418;--danger:#f45b5b;--danger-bg:#2a1010;
  --warning:#f0c040;--warning-bg:#2a2010;--info:#5b9fff;--info-bg:#10203a;
  --sat:#7abaff;--night-text:#b39dff;--night-bg:#1e1530;--night-border:#5a3fa0;
  --day-text:#f5c842;--day-bg:#261f05;--day-border:#c49a10;
  --tab-active-bg:#252a3a;--input-bg:#0f1117;--shadow:0 2px 12px rgba(0,0,0,0.5);
}
:root[data-theme="light"]{
  --bg-page:#f2f1ed;--bg-card:#ffffff;--bg-card2:#f7f6f2;--bg-hover:#f0eeea;
  --border:#e0ddd6;--border-strong:#c8c4bc;--text:#1a1a1a;--text-muted:#6b6b6b;
  --text-hint:#aaa;--primary:#1a3a5c;--primary-bg:#e8f0f8;
  --success:#27ae60;--success-bg:#eafaf1;--danger:#c0392b;--danger-bg:#fdecea;
  --warning:#a07800;--warning-bg:#fffbe6;--info:#1a5cb0;--info-bg:#e3eeff;
  --sat:#1a5cb0;--night-text:#4a2d8a;--night-bg:#f0ebfa;--night-border:#9b7ed4;
  --day-text:#7a5c00;--day-bg:#fffbe6;--day-border:#d4a017;
  --tab-active-bg:#ffffff;--input-bg:#fafafa;--shadow:0 2px 8px rgba(0,0,0,0.08);
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg-page);color:var(--text);min-height:100vh;transition:background 0.2s,color 0.2s}
.app{max-width:860px;margin:0 auto;padding:14px}
.hdr{background:var(--bg-card);border:0.5px solid var(--border);border-radius:14px;padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow)}
.hdr-title{font-size:17px;font-weight:600}
.hdr-sub{font-size:12px;color:var(--text-muted);margin-top:3px}
.hdr-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.lang-group{display:flex;gap:4px}
.lang-btn{padding:4px 10px;border-radius:8px;border:0.5px solid var(--border-strong);font-size:12px;cursor:pointer;background:transparent;color:var(--text-muted);transition:all 0.15s}
.lang-btn.on{background:var(--primary-bg);color:var(--primary);border-color:var(--primary);font-weight:600}
.theme-btn{padding:6px 11px;border-radius:8px;border:0.5px solid var(--border-strong);background:transparent;color:var(--text-muted);cursor:pointer;font-size:16px;transition:all 0.15s}
.theme-btn:hover{background:var(--bg-hover);color:var(--text)}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.stat{background:var(--bg-card);border:0.5px solid var(--border);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow)}
.stat-lbl{font-size:11px;color:var(--text-muted);margin-bottom:5px;font-weight:500}
.stat-val{font-size:21px;font-weight:600}
.stat-val.grn{color:var(--success)}.stat-val.blu{color:var(--info)}
.tab-row{display:flex;gap:4px;background:var(--bg-card2);border:0.5px solid var(--border);border-radius:10px;padding:3px;margin-bottom:14px}
.tab{flex:1;padding:8px 4px;border:none;background:transparent;border-radius:7px;font-size:13px;cursor:pointer;color:var(--text-muted);font-weight:500;transition:all 0.15s}
.tab.on{background:var(--tab-active-bg);color:var(--text);border:0.5px solid var(--border);box-shadow:var(--shadow)}
.card{background:var(--bg-card);border:0.5px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:var(--shadow)}
.card-title{font-size:15px;font-weight:600;margin-bottom:14px}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.cal-nav{width:32px;height:32px;border:0.5px solid var(--border-strong);border-radius:8px;background:transparent;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text);transition:background 0.1s}
.cal-nav:hover{background:var(--bg-hover)}
.cal-month{font-size:16px;font-weight:600}
.shift-hint{font-size:11px;color:var(--text-muted);margin-bottom:8px}
.week-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.wsb{padding:5px 11px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;border:0.5px solid var(--border-strong);background:transparent;color:var(--text-muted);transition:all 0.15s}
.wsb:hover{background:var(--bg-hover)}
.wsb.day-on{background:var(--day-bg);border-color:var(--day-border);color:var(--day-text)}
.wsb.night-on{background:var(--night-bg);border-color:var(--night-border);color:var(--night-text)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.dh{text-align:center;font-size:11px;color:var(--text-muted);padding:5px 0;font-weight:500}
.dh.sun{color:var(--danger)}.dh.sat{color:var(--sat)}
.dc{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;border:1px solid transparent;font-size:12px;font-weight:500;cursor:pointer;transition:background 0.1s,border-color 0.1s}
.dc:hover:not(.empty):not(.future){background:var(--bg-hover);border-color:var(--border-strong)}
.dc.empty,.dc.future{cursor:default;opacity:0.25}
.dc.csun{color:var(--danger)}.dc.csat{color:var(--sat)}
.dc.hol{background:var(--danger-bg)}
.dc.logged{border-color:var(--success);background:var(--success-bg)}
.dc.logged.hol{background:var(--warning-bg);border-color:var(--warning)}
.dc.auto-cred{border-color:var(--info);background:var(--info-bg)}
.dc.today{border-color:var(--primary)!important;border-width:1.5px!important}
.dc .dn{font-size:13px}
.dc .dot{width:5px;height:5px;border-radius:50%;background:var(--success);margin-top:2px}
.dc .hdot{width:5px;height:5px;border-radius:50%;background:var(--danger);margin-top:2px}
.dc .adot{width:5px;height:5px;border-radius:50%;background:var(--info);margin-top:2px}
.hol-list{margin-top:12px;display:flex;flex-wrap:wrap;gap:5px}
.hchip{background:var(--danger-bg);color:var(--danger);border-radius:5px;padding:3px 9px;font-size:11px;font-weight:500}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:0.5px solid var(--border)}
.log-item:last-child{border-bottom:none}
.log-d{font-size:13px;font-weight:600}
.log-sub{font-size:11px;color:var(--text-muted);margin-top:2px}
.log-pay{font-size:14px;font-weight:600;color:var(--success)}
.log-edit{font-size:11px;color:var(--primary);cursor:pointer;margin-left:10px;text-decoration:underline}
.info-box{background:var(--info-bg);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--info);line-height:1.7;margin-bottom:12px;border:0.5px solid var(--border)}
.info-box.warn{background:var(--warning-bg);color:var(--warning);border-color:var(--warning)}
.fg{margin-bottom:12px}
.fg label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:5px;font-weight:500}
.fg input{width:100%;padding:9px 12px;border:0.5px solid var(--border-strong);border-radius:8px;font-size:14px;background:var(--input-bg);color:var(--text)}
.fg input:focus{outline:none;border-color:var(--primary)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.fg-row .fg{margin-bottom:0}
.calc-box{background:var(--bg-card2);border:0.5px solid var(--border);border-radius:8px;padding:13px;margin-top:12px}
.cr{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;color:var(--text-muted)}
.cr.tot{border-top:0.5px solid var(--border);margin-top:7px;padding-top:9px;font-weight:700;font-size:14px;color:var(--text)}
.cr.tax{color:var(--danger)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
.modal{background:var(--bg-card);border:0.5px solid var(--border-strong);border-radius:16px;padding:24px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow)}
.modal h3{font-size:16px;font-weight:700;margin-bottom:3px}
.modal-sub{font-size:12px;color:var(--text-muted);margin-bottom:12px}
.mbadge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;margin:2px}
.b-day{background:var(--day-bg);color:var(--day-text);border:0.5px solid var(--day-border)}
.b-night{background:var(--night-bg);color:var(--night-text);border:0.5px solid var(--night-border)}
.b-hol{background:var(--danger-bg);color:var(--danger)}
.b-sun{background:var(--danger-bg);color:var(--danger)}
.b-sat{background:var(--info-bg);color:var(--info)}
.m-actions{display:flex;gap:8px;margin-top:16px}
.btn-sec{flex:1;padding:10px;background:var(--bg-card2);border:0.5px solid var(--border-strong);border-radius:8px;font-size:13px;cursor:pointer;color:var(--text);font-weight:500}
.btn-sec:hover{background:var(--bg-hover)}
.btn-del{flex:1;padding:10px;background:var(--danger-bg);border:0.5px solid var(--danger);color:var(--danger);border-radius:8px;font-size:13px;cursor:pointer;font-weight:500}
.btn-pri{flex:2;padding:10px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600}
.btn-pri:hover{opacity:0.9}
.wage-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:0.5px solid var(--border)}
.wage-row:last-child{border-bottom:none}
.wage-inp{width:150px;padding:8px 11px;border:0.5px solid var(--border-strong);border-radius:8px;font-size:13px;text-align:right;background:var(--input-bg);color:var(--text)}
.wage-inp:focus{outline:none;border-color:var(--primary)}
.empty-st{text-align:center;padding:40px 16px;color:var(--text-muted);font-size:13px}
.success-banner{background:var(--success-bg);color:var(--success);border:0.5px solid var(--success);border-radius:8px;padding:10px 13px;font-size:13px;margin-bottom:12px;font-weight:500}
.rules-table{width:100%;border-collapse:collapse;font-size:12px}
.rules-table th{text-align:left;padding:7px 10px;font-size:11px;font-weight:600;color:var(--text-muted);border-bottom:0.5px solid var(--border);background:var(--bg-card2)}
.rules-table td{padding:8px 10px;border-bottom:0.5px solid var(--border);vertical-align:top;line-height:1.6}
.rules-table tr:last-child td{border-bottom:none}
@media(max-width:500px){
  .stats-row{grid-template-columns:1fr 1fr}
  .stats-row .stat:last-child{grid-column:1/-1}
  .hdr-right{gap:5px}
  .fg-row{grid-template-columns:1fr}
}
</style>
</head>

const DEFAULT_WAGE=10320,TAX=0.033;
function ld(k,d){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v));}
function pad(n){return String(n).padStart(2,'0');}
function mkds(y,m,d){return`${y}-${pad(m+1)}-${pad(d)}`;}
function pd(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);}
function today(){const d=new Date();return mkds(d.getFullYear(),d.getMonth(),d.getDate());}
function dowOf(s){return pd(s).getDay();}
function getLogs(){return ld('wt4_logs',{});}
function saveLogs(l){sv('wt4_logs',l);}
function getShifts(){return ld('wt4_shifts',{});}
function saveShifts(s){sv('wt4_shifts',s);}
function getWage(){return ld('wt4_wage',DEFAULT_WAGE);}
function isHol(s){return!!HOLIDAYS[s];}
function holName(s){return S.lang==='ko'?(HOL_KO[s]||HOLIDAYS[s]):S.lang==='id'?(HOL_ID[s]||HOLIDAYS[s]):HOLIDAYS[s];}
function isSun(s){return dowOf(s)===0;}
function isSat(s){return dowOf(s)===6;}
function applyTax(g){return Math.round(g*(1-TAX));}

// ── Shift: anchor-based propagation forward indefinitely ─────────────────────
function getMonday(s){
  const d=pd(s),day=d.getDay(),diff=d.getDate()-day+(day===0?-6:1);
  const m=new Date(d);m.setDate(diff);
  return mkds(m.getFullYear(),m.getMonth(),m.getDate());
}

function shiftFor(s){
  const sh=getShifts(),ws=getMonday(s);
  const keys=Object.keys(sh).filter(k=>k<=ws).sort();
  if(!keys.length)return'day';
  const anchor=keys[keys.length-1];
  const anchorShift=sh[anchor];
  const msPerWeek=7*24*3600*1000;
  const weeks=Math.round((pd(ws)-pd(anchor))/msPerWeek);
  return weeks%2===0?anchorShift:(anchorShift==='day'?'night':'day');
}

function setShiftFromWeek(ws,shift){
  // Remove anchors set after ws (they're superseded), set new anchor
  const sh=getShifts();
  Object.keys(sh).filter(k=>k>=ws).forEach(k=>delete sh[k]);
  sh[ws]=shift;
  saveShifts(sh);
}

function toggleShift(ws){
  setShiftFromWeek(ws, shiftFor(ws)==='day'?'night':'day');
}

// ── Sunday auto-credit: all Mon–Fri of that week must be logged ──────────────
function allWeekdaysLogged(s){
  const logs=getLogs(),ws=getMonday(s);
  for(let i=1;i<=5;i++){
    const d=pd(ws);d.setDate(d.getDate()+i);
    if(!logs[mkds(d.getFullYear(),d.getMonth(),d.getDate())])return false;
  }
  return true;
}

// ── Wage calculation ──────────────────────────────────────────────────────────
// regHrs: actual regular hours worked (standard = 8)
// otHrs:  actual overtime hours worked beyond regular
function calcWage(dateStr,regHrs,otHrs,wage){
  const shift=shiftFor(dateStr);
  const holDay=isHol(dateStr)&&!isSun(dateStr),sun=isSun(dateStr),sat=isSat(dateStr);
  const tr=TR[S.lang];
  let eff=0,notes=[];

  // Sunday
  if(sun){
    notes.push(tr.nSun);
    const g=Math.round(8*wage);return{gross:g,net:applyTax(g),eff:8,notes};
  }

  // Public Holiday: always 8h base; any overtime uses same multiplier as shift
  if(holDay){
    notes.push(tr.nHolBase);
    eff=8;
    if(otHrs>0){
      if(shift==='day'){const e=+(otHrs*1.5).toFixed(2);eff=+(8+e).toFixed(2);notes.push(tr.nHolOTday(otHrs));}
      else{const e=+(otHrs*2).toFixed(2);eff=+(8+e).toFixed(2);notes.push(tr.nHolOTnight(otHrs));}
    }
    const g=Math.round(eff*wage);return{gross:g,net:applyTax(g),eff,notes};
  }

  // Saturday
  if(sat){
    if(shift==='day'){
      eff=+(regHrs/8*12).toFixed(2);notes.push(tr.nSatDay(regHrs));
      if(otHrs>0){const e=+(otHrs*1.5).toFixed(2);eff=+(eff+e).toFixed(2);notes.push(tr.nSatDayOT(otHrs));}
    }else{
      eff=+(regHrs/8*13.16).toFixed(2);notes.push(tr.nSatNight(regHrs));
      if(otHrs>0){const e=+(otHrs*2).toFixed(2);eff=+(eff+e).toFixed(2);notes.push(tr.nSatNightOT(otHrs));}
    }
    const g=Math.round(eff*wage);return{gross:g,net:applyTax(g),eff,notes};
  }

  // Normal weekday
  if(shift==='day'){
    eff=regHrs;notes.push(tr.nDay(regHrs));
    if(otHrs>0){const e=+(otHrs*1.5).toFixed(2);eff=+(eff+e).toFixed(2);notes.push(tr.nDayOT(otHrs));}
  }else{
    eff=+(regHrs/8*9.16).toFixed(2);notes.push(tr.nNight(regHrs));
    if(otHrs>0){const e=+(otHrs*2).toFixed(2);eff=+(eff+e).toFixed(2);notes.push(tr.nNightOT(otHrs));}
  }
  const g=Math.round(eff*wage);return{gross:g,net:applyTax(g),eff,notes};
}

function applyTheme(){document.documentElement.setAttribute('data-theme',S.theme);}

// Gross for a date including auto-credits (for stats)
function autoGross(ds,wage){
  const logs=getLogs();
  if(logs[ds])return logs[ds].gross||0;
  if(isSun(ds)&&!isHol(ds)&&ds<=today()&&allWeekdaysLogged(ds))return Math.round(8*wage);
  if(isHol(ds)&&!isSun(ds)&&!logs[ds]&&ds<=today())return Math.round(8*wage);
  return 0;
}
function autoEff(ds){
  const logs=getLogs();
  if(logs[ds])return logs[ds].eff||0;
  if(isSun(ds)&&!isHol(ds)&&ds<=today()&&allWeekdaysLogged(ds))return 8;
  if(isHol(ds)&&!isSun(ds)&&!logs[ds]&&ds<=today())return 8;
  return 0;
}

function buildStats(){
  const wage=getWage(),daysInM=new Date(S.calY,S.calM+1,0).getDate();
  let days=0,hrs=0,gross=0;
  const logs=getLogs();
  for(let d=1;d<=daysInM;d++){
    const ds=mkds(S.calY,S.calM,d);
    const g=autoGross(ds,wage),e=autoEff(ds);
    if(g>0||(logs[ds]&&logs[ds].gross===0)){days++;gross+=g;hrs+=e;}
  }
  const net=applyTax(gross);
  return`<div class="stats-row">
    <div class="stat"><div class="stat-lbl">${t('statDays')} — ${t('mn')[S.calM]}</div><div class="stat-val">${days}</div></div>
    <div class="stat"><div class="stat-lbl">${t('statHours')} — ${t('mn')[S.calM]}</div><div class="stat-val blu">${hrs.toFixed(1)}h</div></div>
    <div class="stat"><div class="stat-lbl">${t('statNet')} — ${t('mn')[S.calM]}</div><div class="stat-val grn">₩${net.toLocaleString()}</div></div>
  </div>`;
}

function getWeekStarts(y,m){
  const days=new Date(y,m+1,0).getDate(),seen=new Set(),weeks=[];
  for(let d=1;d<=days;d++){const s=mkds(y,m,d),mon=getMonday(s);if(!seen.has(mon)){seen.add(mon);weeks.push(mon);}}
  return weeks;
}

function buildCal(){
  const y=S.calY,m=S.calM,firstDay=new Date(y,m,1).getDay(),daysInM=new Date(y,m+1,0).getDate();
  const todayStr=today(),logs=getLogs(),dh=t('dh');
  const weeks=getWeekStarts(y,m);
  const wkBtns=weeks.map(ws=>{
    const sh=shiftFor(ws),d=pd(ws);
    return`<button class="wsb ${sh==='day'?'day-on':'night-on'}" data-ws="${ws}">${sh==='day'?'☀':'☾'} ${d.getMonth()+1}/${d.getDate()}</button>`;
  }).join('');
  let cells='';
  for(let i=0;i<firstDay;i++)cells+=`<div class="dc empty"></div>`;
  for(let d=1;d<=daysInM;d++){
    const s=mkds(y,m,d),dw=new Date(y,m,d).getDay();
    const future=s>todayStr,logged=!!logs[s],hol=isHol(s),tod=s===todayStr;
    const sun=dw===0,autoSun=sun&&!hol&&!logged&&!future&&allWeekdaysLogged(s);
    const autoHol=hol&&!sun&&!logged&&!future;
    let cls='dc';
    if(future)cls+=' future';if(dw===0)cls+=' csun';if(dw===6)cls+=' csat';
    if(hol)cls+=' hol';
    if(logged)cls+=' logged';
    else if(autoSun||autoHol)cls+=' auto-cred';
    if(tod)cls+=' today';
    const dot=logged?`<div class="dot"></div>`:(autoSun||autoHol)?`<div class="adot"></div>`:hol?`<div class="hdot"></div>`:'';
    cells+=`<div class="${cls}" data-date="${s}"><div class="dn">${d}</div>${dot}</div>`;
  }
  const holChips=Object.entries(HOLIDAYS).filter(([s])=>s.startsWith(`${y}-${pad(m+1)}`))
    .map(([s])=>`<span class="hchip">● ${pd(s).getDate()} ${holName(s)}</span>`).join('');
  return`<div class="card">
    <div class="cal-hdr">
      <button class="cal-nav" id="cal-prev">‹</button>
      <div class="cal-month">${t('mn')[m]} ${y}</div>
      <button class="cal-nav" id="cal-next">›</button>
    </div>
    <div class="shift-hint">${t('shiftHint')}</div>
    <div class="week-bar">${wkBtns}</div>
    <div class="cal-grid">
      ${dh.map((d,i)=>`<div class="dh${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('')}
      ${cells}
    </div>
    ${holChips?`<div class="hol-list">${holChips}</div>`:''}
  </div>
  <div style="font-size:11px;color:var(--text-hint);text-align:center;margin-top:-6px;">${t('calHint')}</div>`;
}

function buildLogs(){
  const logs=getLogs(),sorted=Object.entries(logs).sort((a,b)=>b[0].localeCompare(a[0]));
  if(!sorted.length)return`<div class="card"><div class="empty-st">${t('logNone')}</div></div>`;

    const dw=dowOf(ds),hol=isHol(ds),sh=shiftFor(ds);
    const r=l.regHrs!==undefined?l.regHrs:8,o=l.otHrs!==undefined?l.otHrs:0;
    return`<div class="log-item">
      <div>
        <div class="log-d">${ds} (${dn[dw].slice(0,3)}) ${hol?`<span style="color:var(--danger);font-size:11px;">● ${holName(ds)}</span>`:''}</div>
        <div class="log-sub">${sh==='day'?'☀':'☾'} ${sh==='day'?t('dayShift'):t('nightShift')} · ${r}h reg${o>0?' + '+o+'h OT':''} · ${l.eff}h eff</div>

        <div class="log-pay">₩${(l.net||0).toLocaleString()}</div>
        <span class="log-edit" data-date="${ds}">${t('logEdit')}</span>
      </div>
    </div>`;
  }).join('');
  const totalNet=sorted.reduce((a,[,l])=>a+(l.net||0),0);
  return`<div class="card">
    <div class="card-title">${t('logTitle')}</div>
    ${items}
    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:0.5px solid var(--border);margin-top:4px;">

    </div>
  </div>`;
}

function buildModal(){
  const{date,existing}=S.modal;
  const holDay=isHol(date)&&!isSun(date),sun=isSun(date),sat=isSat(date),shift=shiftFor(date);
  const wage=getWage(),dn=t('dn'),dw=dowOf(date);
  let badges='';
  if(holDay)badges+=`<span class="mbadge b-hol">● ${holName(date)}</span>`;
  if(sun)badges+=`<span class="mbadge b-sun">${dn[0]}</span>`;
  if(sat)badges+=`<span class="mbadge b-sat">${dn[6]}</span>`;
  badges+=`<span class="mbadge ${shift==='day'?'b-day':'b-night'}">${shift==='day'?'☀ '+t('dayShift'):'☾ '+t('nightShift')}</span>`;

  const defReg=existing?.regHrs!==undefined?existing.regHrs:8;
  const defOT=existing?.otHrs!==undefined?existing.otHrs:0;
  const reg=S.mReg!==undefined?S.mReg:defReg;
  const ot=S.mOT!==undefined?S.mOT:defOT;
  const autoSunQual=sun&&allWeekdaysLogged(date);

  function previewHTML(r,o){
    const c=calcWage(date,r,o,wage),tax=c.gross-c.net;
    return`<div class="calc-box">
      ${c.notes.map(n=>`<div class="cr"><span>${n}</span></div>`).join('')}
      <div class="cr"><span>${t('gross')}</span><span>₩${c.gross.toLocaleString()}</span></div>
      <div class="cr tax"><span>${t('taxLine')}</span><span>-₩${tax.toLocaleString()}</span></div>
      <div class="cr tot"><span>${t('net')}</span><span>₩${c.net.toLocaleString()}</span></div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:6px;">${t('eff')}: ${c.eff}h · ${t('rateLabel')}: ₩${wage.toLocaleString()}</div>
    </div>`;
  }

  let bodyHTML='';
  if(sun){
    bodyHTML=`<div class="info-box">${autoSunQual?t('sunAuto'):t('sunNotYet')}</div>`;
    if(autoSunQual)bodyHTML+=previewHTML(8,0);
  }else if(holDay){
    // Holiday: only overtime input; regular 8h is automatic
    bodyHTML=`<div class="info-box warn">${t('holInfo')}</div>
    <div class="fg">
      <label>${t('holOtLabel')}</label>
      <input id="m-ot" type="number" value="${ot}" min="0" max="24" step="0.5">
    </div>
    <div id="m-preview">${previewHTML(8,ot)}</div>`;
  }else{
    // Normal/Saturday: two inputs
    bodyHTML=`<div class="fg-row">
      <div class="fg">
        <label>${t('regHrs')}</label>
        <input id="m-reg" type="number" value="${reg}" min="0" max="24" step="0.5">
      </div>
      <div class="fg">
        <label>${t('otHrs')} <span style="font-size:10px;color:var(--text-hint);">${t('otHint')}</span></label>
        <input id="m-ot" type="number" value="${ot}" min="0" max="24" step="0.5">
      </div>
    </div>
    <div id="m-preview">${previewHTML(reg,ot)}</div>`;
  }

  const ov=document.createElement('div');
  ov.className='modal-overlay';ov.id='modal-ov';
  ov.innerHTML=`<div class="modal">
    <h3>${date}</h3>
    <div class="modal-sub">${dn[dw]}</div>
    <div style="margin-bottom:12px;">${badges}</div>
    ${bodyHTML}
    <div class="m-actions">
      <button class="btn-sec" id="m-cancel">${t('cancel')}</button>
      ${existing?`<button class="btn-del" id="m-del">${t('del')}</button>`:''}
      ${!sun?`<button class="btn-pri" id="m-save">${t('save')}</button>`:''}
    </div>
  </div>`;
  document.body.appendChild(ov);

  ov.addEventListener('click',e=>{if(e.target.id==='modal-ov')closeModal();});
  document.getElementById('m-cancel').addEventListener('click',closeModal);
  const delBtn=document.getElementById('m-del');
  if(delBtn)delBtn.addEventListener('click',()=>{const l=getLogs();delete l[date];saveLogs(l);closeModal();});

  const regIn=document.getElementById('m-reg'),otIn=document.getElementById('m-ot');
  function upd(){
    const r=regIn?parseFloat(regIn.value)||0:8,o=otIn?parseFloat(otIn.value)||0:0;
    S.mReg=r;S.mOT=o;
    const prev=document.getElementById('m-preview');
    if(prev)prev.innerHTML=previewHTML(r,o);
  }
  if(regIn)regIn.addEventListener('input',upd);
  if(otIn)otIn.addEventListener('input',upd);

  const saveBtn=document.getElementById('m-save');
  if(saveBtn)saveBtn.addEventListener('click',()=>{
    const r=regIn?parseFloat(regIn.value)||0:8,o=otIn?parseFloat(otIn.value)||0:0;
    // For holidays, reg is always 8 (auto)
    const finalReg=holDay?8:r;
    const c=calcWage(date,finalReg,o,wage);
    const logs=getLogs();
    logs[date]={regHrs:finalReg,otHrs:o,hrs:finalReg+o,gross:c.gross,net:c.net,eff:c.eff};
    saveLogs(logs);closeModal();
  });
}

function closeModal(){
  const ov=document.getElementById('modal-ov');if(ov)ov.remove();
  S.modal=null;S.mReg=undefined;S.mOT=undefined;render();
}

// ── Listeners ─────────────────────────────────────────────────────────────────
function attachListeners(){
  document.getElementById('theme-toggle').addEventListener('click',()=>{
    S.theme=S.theme==='dark'?'light':'dark';sv('wt4_theme',S.theme);render();
  });
  document.querySelectorAll('[data-lang]').forEach(b=>b.addEventListener('click',()=>{
    S.lang=b.dataset.lang;sv('wt4_lang',S.lang);render();
  }));
  document.querySelectorAll('[data-tab]').forEach(b=>b.addEventListener('click',()=>{
    S.tab=b.dataset.tab;S.success='';render();
  }));
  const cp=document.getElementById('cal-prev');
  if(cp)cp.addEventListener('click',()=>{S.calM--;if(S.calM<0){S.calM=11;S.calY--;}render();});
  const cn=document.getElementById('cal-next');
  if(cn)cn.addEventListener('click',()=>{S.calM++;if(S.calM>11){S.calM=0;S.calY++;}render();});
  document.querySelectorAll('.wsb[data-ws]').forEach(b=>b.addEventListener('click',()=>{
    toggleShift(b.dataset.ws);render();
  }));
  document.querySelectorAll('.dc[data-date]').forEach(el=>el.addEventListener('click',()=>{
    const s=el.dataset.date;if(s>today())return;
    const logs=getLogs();
    S.modal={date:s,existing:logs[s]||null};S.mReg=undefined;S.mOT=undefined;render();
  }));
  document.querySelectorAll('.log-edit[data-date]').forEach(el=>el.addEventListener('click',()=>{
    const s=el.dataset.date,logs=getLogs();
    S.modal={date:s,existing:logs[s]||null};S.mReg=undefined;S.mOT=undefined;render();
  }));
  const sw=document.getElementById('save-wage');
  if(sw)sw.addEventListener('click',()=>{
    const w=parseInt(document.getElementById('wage-in').value);
    if(isNaN(w)||w<0)return;
    sv('wt4_wage',w);
    const logs=getLogs();
    Object.entries(logs).forEach(([s,l])=>{
      const r=l.regHrs!==undefined?l.regHrs:8,o=l.otHrs!==undefined?l.otHrs:0;
      const c=calcWage(s,r,o,w);
      logs[s]={...l,gross:c.gross,net:c.net,eff:c.eff};
    });
    saveLogs(logs);S.success=t('wageSaved');render();
  });
}

applyTheme();
render();
</script>
</body>
</html>
